<!DOCTYPE html>
<html>
<head>
<title>Counter App</title>
</head>
<body style="text-align:center;">

<h1 id="count">0</h1>

<button onclick="inc()">+</button>
<button onclick="dec()">-</button>

<script>
let c=0;

function inc(){
c++;
document.getElementById("count").innerHTML=c;
}

function dec(){
c--;
document.getElementById("count").innerHTML=c;
}
</script>

</body>
</html>
