<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do App</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
    width:400px;
}

h2{
    text-align:center;
}

input{
    width:70%;
    padding:10px;
}

button{
    padding:10px;
    background:#007bff;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

ul{
    list-style:none;
    padding:0;
}

li{
    background:#eee;
    margin-top:10px;
    padding:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.delete{
    background:red;
    color:white;
    border:none;
    padding:5px 10px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
    <h2>To-Do List</h2>

    <input type="text" id="task" placeholder="Enter Task">
    <button onclick="addTask()">Add</button>

    <ul id="taskList"></ul>
</div>

<script>
function addTask() {
    let taskInput = document.getElementById("task");
    let taskText = taskInput.value;

    if(taskText === ""){
        alert("Please enter a task");
        return;
    }

    let li = document.createElement("li");

    li.innerHTML = `
        ${taskText}
        <button class="delete" onclick="removeTask(this)">Delete</button>
    `;

    document.getElementById("taskList").appendChild(li);

    taskInput.value = "";
}

function removeTask(button){
    button.parentElement.remove();
}
</script>

</body>
</html>
